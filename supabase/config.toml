project_id = "jcwagkwjdhtuugcfbhui"

[auth]
site_url = "https://www.ajynworld.com"
additional_redirect_urls = [
  "https://www.ajynworld.com/auth",
  "https://ajynworld.com/auth",
  "https://ihsan-d6am.vercel.app/",
  "https://controlled-commerce-hub-main.vercel.app/auth",
  "http://localhost:8080/auth",
  "http://127.0.0.1:8080/auth",
]

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8

[auth.rate_limit]
email_sent = 100

[auth.email.smtp]
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(RESEND_API_KEY)"
admin_email = "no-reply@ajynworld.com"
sender_name = "AJYN"

[auth.email.template.confirmation]
subject = "Verify your AJYN email"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your AJYN password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Your AJYN sign-in link"
content_path = "./supabase/templates/magic-link.html"

[auth.email.template.invite]
subject = "You are invited to AJYN"
content_path = "./supabase/templates/invite.html"

[auth.email.template.email_change]
subject = "Confirm your new AJYN email"
content_path = "./supabase/templates/email-change.html"

[auth.email.template.reauthentication]
subject = "{{ .Token }} is your AJYN verification code"
content_path = "./supabase/templates/reauthentication.html"

[functions.send-push-notification]
verify_jwt = true

[functions.get-paystack-key]
verify_jwt = false

[functions.verify-paystack-payment]
verify_jwt = true

[functions.create-checkout-order]
verify_jwt = true

[functions.pay-deferred-shipping]
verify_jwt = true

[functions.check-birthdays]
verify_jwt = true

[functions.process-referral-reward]
verify_jwt = true

[functions.send-checkout-recovery-reminders]
verify_jwt = true

[functions.send-transactional-email]
verify_jwt = true
