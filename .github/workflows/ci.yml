name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Unit, and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      CI: true
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Write CI environment file
        env:
          CI_VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          CI_VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          cat <<EOF > .env
          VITE_SUPABASE_URL=${CI_VITE_SUPABASE_URL:-https://jcwagkwjdhtuugcfbhui.supabase.co}
          VITE_SUPABASE_PUBLISHABLE_KEY=${CI_VITE_SUPABASE_PUBLISHABLE_KEY:-sb_publishable_7u-bFjW--KZ6Cpoq8B1K0w_fZ_7IBtj}
          EOF

      - name: Run ESLint
        run: npm run lint

      - name: Run Vitest
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          if-no-files-found: ignore
          path: |
            playwright-report/
            test-results/
